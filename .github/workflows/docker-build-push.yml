name: Build & Push to Docker Hub

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-ms-users:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          username: ssilvar2005
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ./ms-users
          push: true
          tags: ssilvar2005/urate-ms-users:latest

  build-ms-academic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          username: ssilvar2005
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: ./ms-academic
          push: true
          tags: ssilvar2005/urate-ms-academic:latest

  build-ms-reviews:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          username: ssilvar2005
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ./ms-reviews
          push: true
          tags: ssilvar2005/urate-ms-reviews:latest

  build-ms-content:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          username: ssilvar2005
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ./ms-content
          push: true
          tags: ssilvar2005/urate-ms-content:latest

  build-ms-analytics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          username: ssilvar2005
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ./ms-analytics
          push: true
          tags: ssilvar2005/urate-ms-analytics:latest

  build-ingesta:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          username: ssilvar2005
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ./ms-analytics/containers/ingest-users
          push: true
          tags: ssilvar2005/urate-ingest-users:latest
      - uses: docker/build-push-action@v5
        with:
          context: ./ms-analytics/containers/ingest-content
          push: true
          tags: ssilvar2005/urate-ingest-content:latest
      - uses: docker/build-push-action@v5
        with:
          context: ./ms-analytics/containers/ingest-reviews
          push: true
          tags: ssilvar2005/urate-ingest-reviews:latest
